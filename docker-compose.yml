# Uncertainty Estimation in Digital Pathology — Docker Compose
# Usage: docker compose up --build   then open http://localhost:5000

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Persist data and cache on host so they survive container rebuild
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    environment:
      - REPO_ROOT=/app
    restart: unless-stopped

volumes:
  hf_cache:
